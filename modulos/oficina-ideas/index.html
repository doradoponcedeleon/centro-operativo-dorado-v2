<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Oficina de Ideas</title>
  <link rel="stylesheet" href="styles.css"/>
</head>
<body>

<div class="menu">
  <a class="btn" href="/centro-operativo-dorado/">Inicio</a>
  <a class="btn" href="/centro-operativo-dorado/">Dashboard</a>
  <a class="btn" href="/centro-operativo-dorado/">Módulos</a>
  <a class="btn" href="/centro-operativo-dorado/apps/">APPS</a>
  <a class="btn" href="/centro-operativo-dorado/ideas/">Ideas</a>
</div>

  <header class="top">
    <h1>Oficina de Ideas</h1>
    <div class="row">
      <button id="btn-new" class="primary">Nueva idea</button>
      <button id="btn-export">Exportar JSON</button>
      <label class="file">Importar JSON<input id="file-import" type="file" accept="application/json"/></label>
      <button id="btn-sync" class="primary">Sincronizar ahora</button>
      <span id="sync-status" class="badge">Sincronización: —</span>
      <a href="../../index.html">← Volver</a>
    </div>
  </header>

  <main class="wrap">
    <section class="card">
      <div class="row">
        <input id="q" placeholder="Buscar por texto o etiqueta"/>
        <select id="drawer">
          <option value="">Todos los cajones</option>
          <option value="captura">Captura</option>
          <option value="prototipo">Prototipo</option>
          <option value="validacion">Validación</option>
          <option value="archivo">Archivo</option>
        </select>
        <button id="btn-mic">🎙️ Dictar</button>
        <span id="mic-status" class="badge">Micrófono listo</span>
      </div>
      <div class="row" style="margin-top:8px">
        <select id="tpl">
          <option value="">Plantillas rápidas…</option>
          <option value="desc">Idea + Descripción + Próximo paso</option>
          <option value="problema">Problema / Solución / Impacto</option>
          <option value="experimento">Hipótesis / Experimento / Métrica</option>
          <option value="pitch">Pitch corto</option>
        </select>
        <button id="btn-tpl">Insertar plantilla</button>
      </div>
      <div id="live" class="live">Transcripción en vivo: —</div>
    </section>

    <section id="list" class="list"></section>
  </main>

  <dialog id="dlg">
    <form method="dialog" id="form">
      <h2 id="dlg-title">Nueva idea</h2>
      <input type="hidden" id="i-id"/>
      <label>Título</label>
      <input id="i-title" required/>
      <label>Descripción</label>
      <textarea id="i-text" rows="5"></textarea>
      <label>Cajón</label>
      <select id="i-drawer">
        <option value="captura">Captura</option>
        <option value="prototipo">Prototipo</option>
        <option value="validacion">Validación</option>
        <option value="archivo">Archivo</option>
      </select>
      <label>Etiquetas (coma)</label>
      <input id="i-tags"/>
      <div class="row">
        <button value="cancel">Cancelar</button>
        <button class="primary" id="i-save" value="default">Guardar</button>
      </div>
    </form>
  </dialog>

  <script src="app.js"></script>

<button onclick="borrarModulos()" style="
  background:#a94442;
  color:white;
  padding:12px 18px;
  border:none;
  border-radius:12px;
  margin:10px;
">
🗑 Borrar módulos
</button>


<script>
function borrarModulos(){
  if(confirm("¿Seguro que deseas borrar todos los módulos guardados?")){
    localStorage.removeItem("modulos");
    localStorage.removeItem("modulos_config");
    localStorage.removeItem("modulos_data");
    alert("Módulos borrados correctamente");
    location.reload();
  }
}
</script>


<script>
/* COD_BORRAR_MODULOS_POR_FILA */
(function(){
  const STORAGE_KEY = "cod_modulos_borrados";

  function getDeleted(){
    try{
      return JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
    }catch(e){
      return [];
    }
  }

  function setDeleted(arr){
    localStorage.setItem(STORAGE_KEY, JSON.stringify(arr));
  }

  function normalize(text){
    return String(text || "")
      .replace(/\s+/g, " ")
      .trim()
      .toLowerCase();
  }

  function getRowTitle(row){
    const selectors = ["strong", "label", "h3", "h4", ".titulo", ".module-title"];
    for(const sel of selectors){
      const el = row.querySelector(sel);
      if(el && el.textContent.trim()){
        return el.textContent.trim();
      }
    }

    const directText = Array.from(row.childNodes)
      .filter(n => n.nodeType === Node.TEXT_NODE)
      .map(n => n.textContent.trim())
      .filter(Boolean)
      .join(" ")
      .trim();

    if(directText) return directText.split(" / ")[0].trim();

    const text = row.textContent.replace(/Guardar|Abrir URL|Abrir Local|Borrar/g, "").trim();
    return text.split("\n")[0].trim();
  }

  function hideQuickButton(title){
    const norm = normalize(title);
    const allButtons = Array.from(document.querySelectorAll("button, a"));
    for(const btn of allButtons){
      const txt = normalize(btn.textContent);
      if(txt === norm){
        const wrap = btn.closest("div") || btn;
        wrap.style.display = "none";
      }
    }
  }

  function removeModuleRow(row, title){
    const deleted = getDeleted();
    const norm = normalize(title);
    if(!deleted.includes(norm)){
      deleted.push(norm);
      setDeleted(deleted);
    }
    hideQuickButton(title);
    row.remove();
  }

  function shouldHide(title){
    return getDeleted().includes(normalize(title));
  }

  function styleDeleteButton(btn){
    btn.style.background = "#a94442";
    btn.style.color = "white";
    btn.style.padding = "8px 12px";
    btn.style.border = "none";
    btn.style.borderRadius = "10px";
    btn.style.marginLeft = "8px";
    btn.style.cursor = "pointer";
    btn.style.whiteSpace = "nowrap";
  }

  function addDeleteButtons(){
    const candidates = Array.from(document.querySelectorAll("div, li, section"))
      .filter(row => {
        const text = row.textContent || "";
        const hasGuardar = /Guardar/.test(text);
        const hasAbrir = /Abrir URL|Abrir Local/.test(text);
        const hasInput = row.querySelector("input");
        return (hasGuardar || hasAbrir) && hasInput;
      });

    candidates.forEach(row => {
      if(row.dataset.codDeleteReady === "1") return;

      const title = getRowTitle(row);
      if(!title) return;

      if(shouldHide(title)){
        hideQuickButton(title);
        row.remove();
        return;
      }

      const btn = document.createElement("button");
      btn.textContent = "Borrar";
      btn.type = "button";
      btn.className = "cod-btn-borrar-modulo";
      styleDeleteButton(btn);

      btn.addEventListener("click", function(){
        const ok = confirm('¿Deseas borrar el módulo "' + title + '"?');
        if(!ok) return;
        removeModuleRow(row, title);
      });

      let anchor =
        Array.from(row.querySelectorAll("button, a")).find(el =>
          /Guardar|Abrir URL|Abrir Local/.test(el.textContent || "")
        );

      if(anchor && anchor.parentNode){
        anchor.insertAdjacentElement("afterend", btn);
      } else {
        row.appendChild(btn);
      }

      row.dataset.codDeleteReady = "1";
    });
  }

  function hideDeletedQuickButtonsOnLoad(){
    const deleted = getDeleted();
    deleted.forEach(name => {
      const allButtons = Array.from(document.querySelectorAll("button, a"));
      for(const btn of allButtons){
        const txt = normalize(btn.textContent);
        if(txt === name){
          const wrap = btn.closest("div") || btn;
          wrap.style.display = "none";
        }
      }
    });
  }

  function init(){
    addDeleteButtons();
    hideDeletedQuickButtonsOnLoad();
  }

  if(document.readyState === "loading"){
    document.addEventListener("DOMContentLoaded", init);
  } else {
    init();
  }

  // por si la página renderiza módulos luego
  setTimeout(init, 500);
  setTimeout(init, 1200);
})();
</script>

</body>
</html>
